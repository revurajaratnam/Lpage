<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body{
            background: #ccc;
        }
        .container{ 
            margin-top: 5%;
            margin-left: 35%;
            width: 30em;
            height: 35em;
            background: #fff;
            border-radius: 2em;
            box-shadow:10px 10px 20px rgba(0, 0, 0, 0.5);
        }
        input[type="text"]{
            margin-top: 5%;
            padding: 2%;
            border-radius: 1em;
            border:1px solid #ccc;
        }
        
        input[type="email"]{
            margin-top: 5%;
            padding: 2%;
            border-radius: 1em;
            border:1px solid #ccc;
        }
        input[type="password"]{
            margin-top: 5%;
            padding: 2%;
            border-radius: 1em;
            border:1px solid #ccc;
        }
        input[type="checkbox"]{
            margin-top: 5%;
            padding: 2%;
            border-radius: 1em;
            border:1px solid #ccc;
        }
       .login{
        padding: 10em;
       }  
       h1{
        color: rgb(37, 69, 252);
        margin-bottom: 20%;
       }
       button{
        width: 100%;
        margin-top: 30%;
        padding: 5%;
        border-radius:1em;
        color: white;
        background: rgb(53, 83, 255);
        border: none;
       }
       button:hover{
        background:rgb(6, 42, 244) ;
       }
      </style>
    </head>
<body>
    <div class="container">
       <div class="login">
        <form action="www.submitted.com">
            <h1>Login Page</h1>
            <input type="text" placeholder="Full name" name="fn">
            <input type="email" placeholder="Email" name="em">
            <input type="password" placeholder="Password" name="pass" pattern="[1-9][a-z]">
            <input type="checkbox">       Show Password
            <button>Sign In</button>
        </form>
       </div>
    </div>
</body>
</html>
